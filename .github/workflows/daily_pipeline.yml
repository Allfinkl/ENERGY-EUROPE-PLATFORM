name: Daily Energy Pipeline

"on":
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary sqlalchemy python-dotenv "dbt-core==1.8.2" "dbt-postgres==1.8.2"

      - name: Fetch energy data
        run: python ingestion/fetch_ember.py
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

      - name: Fetch weather data
        run: python ingestion/fetch_weather.py
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          energy_europe:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.POSTGRES_HOST }}
                user: ${{ secrets.POSTGRES_USER }}
                password: ${{ secrets.POSTGRES_PASSWORD }}
                port: ${{ secrets.POSTGRES_PORT }}
                dbname: ${{ secrets.POSTGRES_DB }}
                schema: marts
                threads: 4
          EOF

      - name: Run dbt transformations
        run: |
          cd dbt/energy_europe
          dbt run

      - name: Train ML model
        run: python ml/train_model.py

      - name: Generate ML predictions
        run: python ml/predict.py